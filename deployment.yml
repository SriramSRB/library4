apiVersion: apps/v1
kind: Deployment
metadata:
  name: library4-deployment 
  labels:
    project: library 
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      project: library
  template:
    metadata:
      labels:
        project: library
    spec:
      containers:
        - name: library4-container 
          image: sriramsrb/library4:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"  

---

apiVersion: v1
kind: Service
metadata:
  name: library4-service 
  labels:
    project: library
spec:
  type: NodePort
  selector:
    project: library
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080